<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Giriş Yap — InsightMap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          ink:   { 950:'#0b1421', 900:'#132033', 850:'#1a2a40', 800:'#22344d' },
          atlas: { 400:'#6db4ff', 500:'#4da3ff' },
          halo:  { 400:'#b399ff', 500:'#9b7cff' },
        },
        fontFamily: { sans:['"Roboto Flex"','system-ui','sans-serif'], mono:['"Roboto Mono"','ui-monospace','monospace'] },
      }}
    };
  </script>
  <style>
    .dot-grid {
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    .text-gradient {
      background: linear-gradient(135deg, #6db4ff 0%, #b399ff 60%, #9b7cff 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
  </style>
</head>
<body class="bg-ink-900 text-slate-200 font-sans antialiased min-h-screen flex flex-col">

  <!-- Arka plan atmosferi -->
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-40 left-1/2 h-[640px] w-[1100px] -translate-x-1/2 rounded-full bg-atlas-500/15 blur-[140px]"></div>
    <div class="absolute bottom-0 -right-40 h-[520px] w-[520px] rounded-full bg-halo-500/15 blur-[120px]"></div>
  </div>
  <div class="dot-grid fixed inset-0 -z-10 [mask-image:radial-gradient(ellipse_at_center,black,transparent_80%)]"></div>

  <!-- Sade üst gezinme alanı -->
  <header class="sticky top-0 z-50 border-b border-white/10 bg-[#162235]/94 backdrop-blur shadow-[0_14px_34px_-24px_rgba(2,6,23,0.7)]">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3.5">
      <a href="/" class="group flex items-center gap-3">
        <span class="flex h-12 items-center rounded-2xl border border-slate-200 bg-gradient-to-r from-white via-[#f8fcff] to-[#fff7f4] px-3 shadow-[0_10px_30px_-24px_rgba(15,23,42,0.35)] transition group-hover:border-slate-300">
          <img src="/logo.png" alt="InsightMap" class="h-9 w-auto" />
        </span>
      </a>
      <a href="/register.html" class="text-sm text-slate-500 transition hover:text-ink-900">Hesabın Yok mu? <span class="text-ink-900">Kayıt Ol</span></a>
    </nav>
  </header>

  <main class="flex-1 grid place-items-center px-6 py-14">
    <div class="w-full max-w-md">
      <div class="text-center">
        <h1 class="text-3xl font-semibold tracking-tight text-white sm:text-4xl">
          Hoş geldin. <span class="text-gradient">Giriş yap.</span>
        </h1>
        <p class="mt-3 text-sm text-slate-400">Alanlarına ve canlı ısı haritalarına erişmek için.</p>
      </div>

      <form id="loginForm" class="mt-9 space-y-4 rounded-2xl border border-white/10 bg-ink-850/60 p-7 backdrop-blur">
        <label class="block">
          <span class="text-xs font-medium uppercase tracking-wider text-slate-500">E-posta</span>
          <input name="email" type="email" required autocomplete="email"
                 class="mt-2 w-full rounded-lg border border-white/10 bg-white/[0.04] px-4 py-2.5 text-sm text-white outline-none transition focus:border-atlas-400/60 focus:bg-white/[0.06]"
                 placeholder="seninle@firma.com" />
        </label>
        <label class="block">
          <span class="text-xs font-medium uppercase tracking-wider text-slate-500">Şifre</span>
          <input name="password" type="password" required autocomplete="current-password"
                 class="mt-2 w-full rounded-lg border border-white/10 bg-white/[0.04] px-4 py-2.5 text-sm text-white outline-none transition focus:border-atlas-400/60 focus:bg-white/[0.06]"
                 placeholder="••••••••" />
        </label>

        <p id="err" class="hidden rounded-md border border-rose-400/30 bg-rose-400/10 px-3 py-2 text-xs text-rose-200"></p>

        <button type="submit"
          class="group mt-2 inline-flex w-full items-center justify-center gap-2 rounded-lg bg-white px-4 py-2.5 text-sm font-medium text-ink-900 transition hover:bg-slate-100 disabled:opacity-60">
          <span class="label">Giriş Yap</span>
          <svg class="h-3.5 w-3.5 transition group-hover:translate-x-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </form>

    </div>
  </main>

  <script>
    // Kullanıcı zaten giriş yaptıysa doğrudan alanlara yönlendir.
    fetch('/api/auth/me', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d && d.ok) location.href = '/stores.html'; })
      .catch(() => {});

    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.add('hidden');
      const btn = form.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.querySelector('.label').textContent = 'Giriş Yapılıyor...';
      try {
        const fd = new FormData(form);
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok || !data.ok) throw new Error(data.error || 'Giriş başarısız');
        location.href = '/stores.html';
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.querySelector('.label').textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
